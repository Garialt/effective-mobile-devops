version: "3.8"

services:
  backend:
    build: ./backend
    container_name: backend
    networks:
      - app-network
    # порты наружу не публикуем – только внутри сети

  nginx:
    image: nginx:1.25-alpine
    container_name: nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    networks:
      - app-network
    depends_on:
      - backend

networks:
  app-network:
    driver: bridge